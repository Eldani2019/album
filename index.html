<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Album Tracker - Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .card-custom {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
        }
        .badge-count {
            background: #3b82f6;
            color: white;
        }
        .list-group-item-custom {
            background: #1e293b;
            color: #f1f5f9;
            border: 1px solid #334155;
            transition: all 0.2s ease;
        }
        .list-group-item-custom:hover {
            background: #273549;
            color: #fff;
        }
        .btn-primary-custom {
            background-color: #3b82f6;
            border: none;
        }
        .btn-primary-custom:hover {
            background-color: #2563eb;
        }
        .btn-minus {
            padding: 2px 8px;
            font-size: 0.85rem;
            border-radius: 6px;
        }
        .form-control.bg-dark-custom {
            background-color: #0f172a !important;
            color: #f8fafc !important;
            border-color: #475569 !important;
        }
        .form-control.bg-dark-custom::placeholder {
            color: #94a3b8 !important;
            opacity: 1;
        }
        .feedback-success { color: #4ade80 !important; }
        .feedback-warning { color: #fbbf24 !important; }
         
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-4">
        <h1 class="fw-bold text-white">🏆 Álbum Tracker</h1>
        <p class="text-light">Búsquedas públicas y modificaciones directas sin contraseñas.</p>
        <button id="btn-reset" class="btn btn-outline-danger btn-sm mt-1 px-3" style="border-radius: 8px; font-weight: 500;">
            🔄 Restablecer al Estado Inicial (Borrar cambios guardados)
        </button>
    </div>

    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <div class="card card-custom p-4 shadow-lg">
                <h5 class="card-title mb-3 fw-bold text-info">✨ Registrar Nueva Tarjeta</h5>
                <form id="form-registro" class="d-flex gap-2">
                    <input type="text" id="input-nueva" class="form-control bg-dark-custom text-uppercase" placeholder="Ej: Mex 4 o Digitales" required>
                    <button type="submit" class="btn btn-primary-custom text-white px-4">Registrar</button>
                </form>
                <div id="feedback-registro" class="small mt-2 text-center fw-bold"></div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card card-custom p-4 shadow-sm h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold m-0 text-danger">❌ Faltantes (Condensadas)</h5>
                    <span id="total-faltantes" class="badge badge-count rounded-pill fs-6">0</span>
                </div>
                <input type="text" id="buscar-faltantes" class="form-control bg-dark-custom mb-3" placeholder="🔍 Buscar categoría o número...">
                <div style="max-height: 400px; overflow-y: auto;">
                    <ul id="lista-faltantes" class="list-group"></ul>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card card-custom p-4 shadow-sm h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold m-0 text-success">🔁 Repetidas (Condensadas)</h5>
                    <span id="total-repetidas" class="badge bg-success rounded-pill fs-6">Total: 0</span>
                </div>
                <input type="text" id="buscar-repetidas" class="form-control bg-dark-custom mb-3" placeholder="🔍 Buscar categoría o número...">
                <div style="max-height: 400px; overflow-y: auto;">
                    <ul id="lista-repetidas" class="list-group"></ul>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-5">
        <div class="col-12">
            <div class="card card-custom p-4 shadow-sm">
                <h6 class="text-white fw-bold mb-3 text-center">📋 Exportar / Copiar Datos al Portapapeles</h6>
                <div class="row g-2 justify-content-center">
                    <div class="col-md-5">
                        <button id="btn-export-faltantes" class="btn btn-outline-danger btn-sm w-100 py-2 fw-semibold">
                            📋 Copiar Faltantes Condensados
                        </button>
                    </div>
                    <div class="col-md-5">
                        <button id="btn-export-repetidas" class="btn btn-outline-success btn-sm w-100 py-2 fw-semibold">
                            📋 Copiar Repetidas Condensadas
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const ORIGINAL_FALTANTES = [
        "Cze 5",
        "Qat 19",
        "Sco 13",
        "Civ 15",
        "Ecu 18",
        "Swe 6",
        "Egy 17",
        "Fra 7",
        "Por 13",
        "Col 14",
        "Eng 2"
    ];

    const ORIGINAL_REPETIDAS = {
        "Rsa 1": 1, "Rsa 6": 1, "Rsa 11": 1,
        "Cze 1": 1, // 📉 Bajó de 2 a 1
        "Can 18": 1, // ❌ Can 19 fue eliminada
        "Usa 2": 1, "Usa 12": 1, "Usa 15": 1,
        "Par 3": 1, "Par 7": 1, "Par 19": 1, // 🆕 Se agregó Par 7
        "Aus 14": 1,
        "Ger 17": 1,
        "Cuw 9": 1,
        "Civ 13": 1,
        "Ecu 5": 1, "Ecu 16": 1,
        "Ned 7": 2,
        "Jpn 1": 1, "Jpn 15": 1, // ❌ Jpn 19 fue eliminada
        "Bel 1": 1,
        "Egy 4": 1, "Egy 6": 1, // ❌ Egy 3 fue eliminada y Egy 4 bajó de 2 a 1
        "Irn 1": 3,
        "Nzl 2": 2, "Nzl 14": 1,
        "Cpv 9": 1, "Cpv 16": 2, "Cpv 20": 1,
        "Ksa 11": 1, "Ksa 14": 1,
        "Uru 6": 1, "Uru 8": 1, "Uru 15": 1, // ❌ Uru 7 fue eliminada
        "Sen 4": 1, "Sen 7": 1,
        "Irq 1": 1,
        "Nor 2": 1, "Nor 14": 1, "Nor 20": 1, // ❌ Nor 5 fue eliminada
        "Arg 5": 1, "Arg 12": 1, "Arg 18": 1,
        "Alg 8": 1, // ❌ Alg 7 y Alg 14 fueron eliminadas
        "Cod 11": 1, // ❌ Cod 1 y Cod 9 fueron eliminadas
        "Uzb 10": 1,
        "Col 6": 1, "Col 11": 1, // ❌ Col 9 y Col 12 fueron eliminadas
        "Cro 1": 1, "Cro 20": 1,
        "Gha 1": 2, "Gha 3": 1, "Gha 7": 1, "Gha 11": 2,
        "Pan 1": 1, "Pan 13": 1, "Pan 16": 1 // ❌ Pan 9 y Pan 14 eliminadas; Pan 16 bajó de 2 a 1
    };

    let faltantes = JSON.parse(localStorage.getItem('tracker_faltantes')) || [...ORIGINAL_FALTANTES];
    let repetidas = JSON.parse(localStorage.getItem('tracker_repetidas')) || {...ORIGINAL_REPETIDAS};

    document.addEventListener("DOMContentLoaded", () => {
        renderAll();
        setupListeners();
    });

    function guardarEnStorage() {
        localStorage.setItem('tracker_faltantes', JSON.stringify(faltantes));
        localStorage.setItem('tracker_repetidas', JSON.stringify(repetidas));
    }

    function renderAll() {
        const queryFaltantes = document.getElementById("buscar-faltantes").value;
        const queryRepetidas = document.getElementById("buscar-repetidas").value;
        renderFaltantes(queryFaltantes);
        renderRepetidas(queryRepetidas);
    }

    function obtenerFaltantesAgrupados() {
        const grupos = {};
        faltantes.forEach(item => {
            const match = item.match(/^([a-zA-Z\s]+)\s+(\d+)$/);
            if (match) {
                const prefijo = match[1].trim();
                const numero = parseInt(match[2]);
                if (!grupos[prefijo]) grupos[prefijo] = [];
                grupos[prefijo].push(numero);
            } else {
                if (!grupos[item]) grupos[item] = [];
            }
        });
        Object.keys(grupos).forEach(prefijo => {
            grupos[prefijo].sort((a, b) => a - b);
        });
        return grupos;
    }

    function obtenerRepetidasAgrupadas() {
        const grupos = {};
        Object.keys(repetidas).forEach(item => {
            const match = item.match(/^([a-zA-Z\s]+)\s+(\d+)$/);
            if (match) {
                const prefijo = match[1].trim();
                const numero = parseInt(match[2]);
                if (!grupos[prefijo]) grupos[prefijo] = [];
                grupos[prefijo].push({ numero: numero, cantidad: repetidas[item] });
            } else {
                if (!grupos[item]) grupos[item] = [];
                grupos[item].push({ numero: null, cantidad: repetidas[item] });
            }
        });
        Object.keys(grupos).forEach(prefijo => {
            grupos[prefijo].sort((a, b) => (a.numero || 0) - (b.numero || 0));
        });
        return grupos;
    }

    function renderFaltantes(filter = "") {
        const lista = document.getElementById("lista-faltantes");
        lista.innerHTML = "";
        const query = filter.toLowerCase().trim();
        
        const grupos = obtenerFaltantesAgrupados();
        let totalUnidadesFaltantes = faltantes.length;

        Object.keys(grupos).forEach(prefijo => {
            const lineaTextoCompleto = `${prefijo}: ${grupos[prefijo].join(", ")}`;

            if (lineaTextoCompleto.toLowerCase().includes(query)) {
                const li = document.createElement("li");
                li.className = "list-group-item list-group-item-custom py-2";
                
                const containerFlex = document.createElement("div");
                containerFlex.className = "d-flex justify-content-between align-items-center w-100";

                const spanText = document.createElement("span");
                spanText.className = "fw-medium";
                spanText.innerHTML = `<strong class="text-info">${prefijo}:</strong> ${grupos[prefijo].join(", ")}`;
                
                const btnMinus = document.createElement("button");
                btnMinus.className = "btn btn-outline-danger btn-sm btn-minus";
                btnMinus.innerHTML = "−";
                
                const divControles = document.createElement("div");
                divControles.className = "mt-2 pt-2 border-top border-secondary d-none text-end";
                
                btnMinus.onclick = () => { divControles.classList.toggle("d-none"); };

                grupos[prefijo].forEach(num => {
                    const btnNum = document.createElement("button");
                    btnNum.className = "btn btn-sm btn-danger me-1 mb-1 font-monospace px-2 py-0";
                    btnNum.style.fontSize = "0.75rem";
                    btnNum.textContent = num;
                    btnNum.onclick = () => retirarFaltante(`${prefijo} ${num}`);
                    divControles.appendChild(btnNum);
                });

                containerFlex.appendChild(spanText);
                containerFlex.appendChild(btnMinus);
                li.appendChild(containerFlex);
                li.appendChild(divControles);
                lista.appendChild(li);
            }
        });
        document.getElementById("total-faltantes").textContent = totalUnidadesFaltantes;
    }

    function renderRepetidas(filter = "") {
        const lista = document.getElementById("lista-repetidas");
        lista.innerHTML = "";
        const query = filter.toLowerCase().trim();
        
        const grupos = obtenerRepetidasAgrupadas();
        let totalAcumulado = 0;

        Object.keys(repetidas).forEach(k => totalAcumulado += repetidas[k]);

        Object.keys(grupos).forEach(prefijo => {
            const formatoElementos = grupos[prefijo].map(el => {
                return el.numero !== null ? `${el.numero} (x${el.cantidad})` : `(x${el.cantidad})`;
            });
            const lineaTextoCompleto = `${prefijo}: ${formatoElementos.join(", ")}`;

            if (lineaTextoCompleto.toLowerCase().includes(query)) {
                const li = document.createElement("li");
                li.className = "list-group-item list-group-item-custom py-2";

                const containerFlex = document.createElement("div");
                containerFlex.className = "d-flex justify-content-between align-items-center w-100";

                const spanText = document.createElement("span");
                spanText.className = "fw-medium";
                spanText.innerHTML = `<strong class="text-success">${prefijo}:</strong> ${formatoElementos.join(", ")}`;

                const btnMinus = document.createElement("button");
                btnMinus.className = "btn btn-outline-warning btn-sm btn-minus";
                btnMinus.innerHTML = "−";

                const divControles = document.createElement("div");
                divControles.className = "mt-2 pt-2 border-top border-secondary d-none text-end";

                btnMinus.onclick = () => { divControles.classList.toggle("d-none"); };

                grupos[prefijo].forEach(el => {
                    const btnNum = document.createElement("button");
                    btnNum.className = "btn btn-sm btn-warning me-1 mb-1 font-monospace px-2 py-0 text-dark fw-bold";
                    btnNum.style.fontSize = "0.75rem";
                    btnNum.textContent = el.numero !== null ? `${el.numero}` : prefijo;
                    
                    const itemKey = el.numero !== null ? `${prefijo} ${el.numero}` : prefijo;
                    btnNum.onclick = () => retirarRepetida(itemKey);
                    divControles.appendChild(btnNum);
                });

                containerFlex.appendChild(spanText);
                containerFlex.appendChild(btnMinus);
                li.appendChild(containerFlex);
                li.appendChild(divControles);
                lista.appendChild(li);
            }
        });
        document.getElementById("total-repetidas").textContent = `Total: ${totalAcumulado}`;
    }

    function retirarFaltante(item) {
        const idx = faltantes.findIndex(f => f.toLowerCase().replace(/\s+/g, ' ') === item.toLowerCase().replace(/\s+/g, ' '));
        if (idx !== -1) {
            faltantes.splice(idx, 1);
            guardarEnStorage();
            renderAll();
        }
    }

    function retirarRepetida(item) {
        const keyExistente = Object.keys(repetidas).find(k => k.toLowerCase().replace(/\s+/g, ' ') === item.toLowerCase().replace(/\s+/g, ' '));
        if (keyExistente && repetidas[keyExistente]) {
            repetidas[keyExistente] -= 1;
            if (repetidas[keyExistente] <= 0) {
                delete repetidas[keyExistente];
            }
            guardarEnStorage();
            renderAll();
        }
    }

    function ejecutarRegistro() {
        const input = document.getElementById("input-nueva");
        let tarjeta = input.value.trim().replace(/\s+/g, ' ');
        tarjeta = tarjeta.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        
        const feedback = document.getElementById("feedback-registro");
        if (!tarjeta) return;

        const indexFaltante = faltantes.findIndex(f => f.toLowerCase() === tarjeta.toLowerCase());

        if (indexFaltante !== -1) {
            faltantes.splice(indexFaltante, 1);
            feedback.className = "small mt-2 text-center feedback-success";
            feedback.textContent = `¡Faltante obtenido! Se eliminó de la lista de faltantes.`;
        } else {
            const keyExistente = Object.keys(repetidas).find(k => k.toLowerCase() === tarjeta.toLowerCase());
            if (keyExistente) {
                repetidas[keyExistente] += 1;
            } else {
                repetidas[tarjeta] = 1;
            }
            feedback.className = "small mt-2 text-center feedback-warning";
            feedback.textContent = `Añadida a Repetidas (+1).`;
        }

        input.value = "";
        guardarEnStorage();
        renderAll();
        setTimeout(() => { feedback.textContent = ""; }, 4000);
    }

    function copiarAlClipboard(texto, mensajeExito) {
        navigator.clipboard.writeText(texto).then(() => {
            alert(mensajeExito);
        }).catch(err => {
            console.error('Error al copiar al portapapeles: ', err);
            alert("No se pudo copiar automáticamente. Inténtalo de nuevo.");
        });
    }

    function exportarFaltantesCSV() {
        if(faltantes.length === 0) {
            alert("No hay elementos en la lista de faltantes para copiar.");
            return;
        }
        const grupos = obtenerFaltantesAgrupados();
        const lineas = [];
        Object.keys(grupos).forEach(prefijo => {
            if (grupos[prefijo].length > 0) {
                lineas.push(`${prefijo}: ${grupos[prefijo].join(", ")}`);
            } else {
                lineas.push(prefijo);
            }
        });
        
        copiarAlClipboard(lineas.join("\n"), "📋 ¡Lista de Faltantes condensada copiada al portapapeles con éxito!");
    }

    function exportarRepetidasCSV() {
        const grupos = obtenerRepetidasAgrupadas();
        const keysGrupos = Object.keys(grupos);
        if(keysGrupos.length === 0) {
            alert("No hay elementos en la lista de repetidas para copiar.");
            return;
        }
        
        const lineas = [];
        keysGrupos.forEach(prefijo => {
            const formatoElementos = grupos[prefijo].map(el => {
                return el.numero !== null ? `${el.numero} (x${el.cantidad})` : `(x${el.cantidad})`;
            });
            lineas.push(`${prefijo}: ${formatoElementos.join(", ")}`);
        });

        copiarAlClipboard(lineas.join("\n"), "📋 ¡Lista de Repetidas condensada copiada al portapapeles con éxito!");
    }

    function setupListeners() {
        document.getElementById("buscar-faltantes").addEventListener("input", (e) => renderFaltantes(e.target.value));
        document.getElementById("buscar-repetidas").addEventListener("input", (e) => renderRepetidas(e.target.value));

        document.getElementById("form-registro").addEventListener("submit", (e) => {
            e.preventDefault();
            ejecutarRegistro();
        });

        document.getElementById("btn-export-faltantes").addEventListener("click", () => { exportarFaltantesCSV(); });
        document.getElementById("btn-export-repetidas").addEventListener("click", () => { exportarRepetidasCSV(); });

        document.getElementById("btn-reset").addEventListener("click", () => {
            if(confirm("¿Seguro que deseas BORRAR todos tus cambios guardados y regresar a la base original?")) {
                faltantes = [...ORIGINAL_FALTANTES];
                repetidas = {...ORIGINAL_REPETIDAS};
                localStorage.removeItem('tracker_faltantes');
                localStorage.removeItem('tracker_repetidas');
                document.getElementById("buscar-faltantes").value = "";
                document.getElementById("buscar-repetidas").value = "";
                renderAll();
            }
        });
    }
</script>

</body>
</html>
